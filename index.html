<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice Cloning Comparison</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f6f7fb;
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
    color:#222;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:40px;
}

.comparison{
    background:white;
    border-radius:12px;
    padding:25px;
    margin-bottom:35px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.comparison h2{
    margin-top:0;
}

.players{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.sample{
    text-align:center;
}

.sample h3{
    margin-bottom:15px;
}

audio{
    width:100%;
}

.note{
    margin-top:20px;
    color:#666;
    font-size:14px;
    text-align:center;
}

@media(max-width:800px){

.players{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<h1>Generated Voice Comparison</h1>

<p class="subtitle">
Listen to Sample A and Sample B for each voice.
You may replay either sample as many times as you'd like before submitting your response.
</p>


<div class="comparison">

<h2>Voice 1</h2>

<div class="players">

<div class="sample">
<h3>Sample A</h3>

<audio controls preload="none">
<source src="voice1_A.wav" type="audio/wav">
</audio>

</div>

<div class="sample">
<h3>Sample B</h3>

<audio controls preload="none">
<source src="voice1_B.wav" type="audio/wav">
</audio>

</div>

</div>

</div>



<div class="comparison">

<h2>Voice 2</h2>

<div class="players">

<div class="sample">
<h3>Sample A</h3>

<audio controls preload="none">
<source src="voice2_A.wav" type="audio/wav">
</audio>

</div>

<div class="sample">
<h3>Sample B</h3>

<audio controls preload="none">
<source src="voice2_B.wav" type="audio/wav">
</audio>

</div>

</div>

</div>



<div class="comparison">

<h2>Voice 3</h2>

<div class="players">

<div class="sample">
<h3>Sample A</h3>

<audio controls preload="none">
<source src="voice3_A.wav" type="audio/wav">
</audio>

</div>

<div class="sample">
<h3>Sample B</h3>

<audio controls preload="none">
<source src="voice3_B.wav" type="audio/wav">
</audio>

</div>

</div>

</div>

<script>

  const players = document.querySelectorAll("audio");

players.forEach(player => {
    player.addEventListener("play", () => {
        players.forEach(other => {
            if (other !== player) {
                other.pause();
            }
        });
    });
});
</script>

</body>
</html>
